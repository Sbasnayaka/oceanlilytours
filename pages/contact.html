<body class="bg-surface font-body text-on-surface antialiased">

<nav class="fixed top-0 w-full z-50 bg-black/40 shadow-lg">

<div class="hidden md:flex gap-6 items-center flex-1 justify-center"><a href="../index.html" class="font-bold text-sm text-white border-b-2 border-transparent hover:border-white pb-1">Home</a><a href="packages.html" class="font-bold text-sm text-white border-b-2 border-transparent hover:border-white pb-1">Packages</a></div>
<button class="md:hidden" id="hamburgerBtn"><div class="hamburger" id="hamburgerIcon"><span></span><span></span><span></span></div></button>
</div>

<div class="mobile-menu" id="mobileMenu"><a href="../index.html" class="mobile-nav-link">Home</a><a href="packages.html" class="mobile-nav-link">Packages</a><button class="w-11/12 mx-auto block mt-6 bg-primary text-white px-6 py-3 rounded-full font-semibold" onclick="toggleMobileMenu();">Close</button></div>

<section class="pt-32 pb-12 md:pb-20 bg-gradient-to-b from-primary/10 to-surface">
<div class="max-w-7xl mx-auto px-4 sm:px-6 md:px-8">
<h1 class="text-3xl sm:text-4xl md:text-5xl font-headline font-extrabold text-on-surface mb-4">Get in Touch</h1>
<p class="text-base sm:text-lg text-on-surface-variant max-w-2xl">Have questions? Contact us and we'll respond within 24 hours.</p>
</div>
</section>

<section class="py-12 md:py-24 bg-surface">
<div class="max-w-4xl mx-auto px-4 sm:px-6 md:px-8">
<div class="bg-white rounded-2xl shadow-luxury p-6 md:p-12">
<form id="contact-form" class="space-y-6">
<div>
<label for="name" class="block text-sm font-semibold text-on-surface mb-2">Full Name</label>
<input type="text" id="name" name="name" class="w-full px-4 py-3 border border-outline-variant rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary" placeholder="Your name" required />
</div>

<div>
<label for="email" class="block text-sm font-semibold text-on-surface mb-2">Email Address</label>
<input type="email" id="email" name="email" class="w-full px-4 py-3 border border-outline-variant rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary" placeholder="your@email.com" required />
</div>

<div>
<label for="phone" class="block text-sm font-semibold text-on-surface mb-2">Phone Number</label>
<input type="tel" id="phone" name="phone" class="w-full px-4 py-3 border border-outline-variant rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary" placeholder="+1 (555) 000-0000" />
</div>

<div>
<label for="subject" class="block text-sm font-semibold text-on-surface mb-2">Subject</label>
<input type="text" id="subject" name="subject" class="w-full px-4 py-3 border border-outline-variant rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary" placeholder="How can we help?" required />
</div>

<div>
<label for="message" class="block text-sm font-semibold text-on-surface mb-2">Message</label>
<textarea id="message" name="message" rows="6" class="w-full px-4 py-3 border border-outline-variant rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary resize-vertical" placeholder="Tell us more..." required></textarea>
</div>

<div id="form-message" class="hidden p-4 rounded-lg"></div>

<button type="submit" class="w-full bg-primary text-white px-6 py-3 rounded-full font-semibold hover:bg-primary/90 transition-colors duration-300 disabled:opacity-50 disabled:cursor-not-allowed" id="submit-btn">Send Message</button>
</form>
</div>
</div>
</section>

<footer class="bg-on-surface text-white py-8 md:py-16">
<div class="max-w-7xl mx-auto px-4 sm:px-6 md:px-8 text-center text-xs opacity-70">© 2026 Ocean Lilly Tours</div>
</footer>
